<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AutoKeeper" />
  <meta name="theme-color" content="#0b0c10" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f0f2f7" media="(prefers-color-scheme: light)" />
  <title>AutoKeeper</title>
  <link rel="manifest" href="manifest.json" />
  <!-- Apple touch icon (inline SVG as data URI so it works without a server) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0c10'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🛢%3C/text%3E%3C/svg%3E" />

    body { margin: 0; overscroll-behavior-y: none; }
    /* Safe area insets for notched phones */
    #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (CDN — works offline after first load via service worker) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;



const STORAGE_KEY = "vehicle-maintenance-app-v3";
const APP_VERSION = "1.1.0";

// ─── Maintenance items — ordered most → least frequent ───────────────────────
const STATIC_ITEMS = [
  { id:"oil-change",        name:"Oil Change",                        description:"Engine oil & filter replacement",                                      type:"mileage", intervalMiles:5000,  intervalLabel:"Every 5k miles",       icon:"🛢️" },
  { id:"caliper-grease",    name:"Grease Calipers",                   description:"Apply silicone grease to brake calipers",                              type:"time",    intervalMonths:12,   intervalLabel:"Once a year",          icon:"🔧" },
  { id:"undercoat",         name:"Lénine Undercoat",                  description:"Apply undercoating — avoid rubber components (~$150)",                 type:"time",    intervalMonths:12,   intervalLabel:"Once a year",          icon:"🛡️" },
  { id:"undercarriage-wash",name:"Undercarriage Wash",                description:"Pre-winter + one warm mid-winter + post-winter. Skip below freezing.",type:"seasonal",                     intervalLabel:"Seasonal (3×/winter)", icon:"🚿" },
  { id:"brake-fluid",       name:"Brake Fluid Change",                description:"Full brake fluid replacement",                                         type:"time",    intervalMonths:36,   intervalLabel:"Every 3 years",        icon:"🛑" },
  { id:"trans-fluid",       name:"Transmission Fluid",                description:"3–4 qt drain and fill",                                               type:"mileage", intervalMiles:40000, intervalLabel:"Every 30–50k miles",   icon:"⚙️" },
  { id:"coolant",           name:"Flush Coolant & Change Thermostat", description:"Full coolant flush + thermostat replacement",                          type:"mileage", intervalMiles:50000, intervalLabel:"Every 50k miles",      icon:"🌡️" },
];

const TIP = "💡 When something breaks, fix it within a week.";

// Items that can be skipped if user lives in a mild/no-salt climate
const SKIPPABLE_ITEMS = {
  "undercoat":          { reason: "Most valuable in regions with road salt, snow, or coastal humidity. If you live somewhere mild and dry year-round, this is optional." },
  "undercarriage-wash": { reason: "Primarily protects against road salt corrosion in winter. If your area doesn't use road salt or you rarely see snow/ice, this can be skipped." },
};

// ── Financial data for cost analysis ────────────────────────────────────────
const COST_DATA = {
  maintenance: [
    { name:"Oil Change",               low:35,   high:120,  freqPerYear:2,   note:"2–4x/year depending on interval" },
    { name:"Grease Calipers",          low:0,    high:30,   freqPerYear:1,   note:"Often DIY; shop: ~$30" },
    { name:"Lénine Undercoat",         low:100,  high:200,  freqPerYear:1,   note:"~$150 typical" },
    { name:"Undercarriage Wash",       low:10,   high:25,   freqPerYear:3,   note:"3x/winter season" },
    { name:"Brake Fluid Change",       low:80,   high:150,  freqPerYear:0.33,note:"Every 3 years" },
    { name:"Transmission Fluid",       low:100,  high:300,  freqPerYear:0.15,note:"Every 30–50k miles" },
    { name:"Coolant Flush + Stat",     low:100,  high:250,  freqPerYear:0.1, note:"Every 50k miles" },
    { name:"Tires (all-season, set)",  low:400,  high:900,  freqPerYear:0.2, note:"Every 5–7 years" },
    { name:"Tires (winter, set)",      low:350,  high:700,  freqPerYear:0.2, note:"Every 5–7 years" },
  ],
  repairs: [
    { name:"Engine replacement",       low:3000, high:10000, note:"Neglected oil = engine wear" },
    { name:"Transmission rebuild",     low:1500, high:5000,  note:"Neglected fluid = failure" },
    { name:"Brake caliper/rotor replacement", low:300, high:900, note:"Neglected grease = seized calipers" },
    { name:"Rust repair (frame/body)", low:500,  high:5000,  note:"Skipped undercoat/wash on salted roads" },
    { name:"Coolant system failure",   low:400,  high:2000,  note:"Overheating, head gasket risk" },
  ],
  newCarCost: { low: 28000, high: 48000, avgMonthly: 700, note: "Average new car price in the US (2024)" },
};
const MAKES = ["Acura","Alfa Romeo","Aston Martin","Audi","Bentley","BMW","Buick","Cadillac","Chevrolet","Chrysler","Dodge","Ferrari","FIAT","Ford","Genesis","GMC","Honda","Hyundai","INFINITI","Jaguar","Jeep","Kia","Lamborghini","Land Rover","Lexus","Lincoln","Maserati","Mazda","McLaren","Mercedes-Benz","MINI","Mitsubishi","Nissan","Porsche","RAM","Rivian","Rolls-Royce","Subaru","Tesla","Toyota","Volkswagen","Volvo","Other"];
const DEFAULT_TIRE_MILES = { allseason:50000, winter:30000 };

// ─── Tread depth thresholds (32nds of an inch) ───────────────────────────────
// New tire ≈ 10/32"  |  Good: ≥7  |  Monitor: 5–6  |  Plan: 3–4  |  Replace: ≤2
const TREAD = {
  new:     { min:10, label:"New",          color:"#27ae60", bg_d:"#0a2615", bg_l:"#e8f8ee" },
  good:    { min:7,  label:"Good",         color:"#2ecc71", bg_d:"#0d2b1a", bg_l:"#f0faf4" },
  monitor: { min:5,  label:"Monitor Wear", color:"#f39c12", bg_d:"#2d2009", bg_l:"#fef8ec" },
  plan:    { min:3,  label:"Plan Replacement", color:"#e67e22", bg_d:"#2d1a05", bg_l:"#fef3e2" },
  replace: { min:0,  label:"REPLACE NOW",  color:"#e74c3c", bg_d:"#3d1414", bg_l:"#fef0f0" },
};

function getTreadLevel(depth32) {
  const d = Number(depth32);
  if (isNaN(d)) return null;
  if (d >= TREAD.new.min)     return "new";
  if (d >= TREAD.good.min)    return "good";
  if (d >= TREAD.monitor.min) return "monitor";
  if (d >= TREAD.plan.min)    return "plan";
  return "replace";
}

// Natural wear estimate: ~1/32" per 8–10k miles (conservative)
const WEAR_RATE_PER_MILE = 1 / 9000;

function estimatedTread(baseTread, baseMiles, currentMiles) {
  if (!baseTread || !baseMiles || !currentMiles) return null;
  const driven = Number(currentMiles) - Number(baseMiles);
  if (driven < 0) return Number(baseTread);
  return Math.max(0, Number(baseTread) - driven * WEAR_RATE_PER_MILE);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function genId() { return Math.random().toString(36).slice(2,10); }

function milesStatus(lastMiles, currentMiles, intervalMiles) {
  if (!lastMiles || !currentMiles || !intervalMiles) return "unknown";
  const pct = (Number(currentMiles) - Number(lastMiles)) / Number(intervalMiles);
  if (pct >= 1) return "overdue";
  if (pct >= 0.8) return "due-soon";
  return "ok";
}

function timeStatus(lastDate, intervalMonths) {
  if (!lastDate) return "unknown";
  const d = new Date(lastDate);
  d.setMonth(d.getMonth() + intervalMonths);
  const days = Math.round((d - new Date()) / 86400000);
  if (days <= 0) return "overdue";
  if (days <= 60) return "due-soon";
  return "ok";
}

// ─── Theme ───────────────────────────────────────────────────────────────────
function makeTheme(dark) {
  return dark ? {
    bg:"#0b0c10",surface:"#13141a",surface2:"#1a1b24",border:"#1e2030",border2:"#2a2d3e",
    text:"#e0e0e0",textMuted:"#888",textFaint:"#555",accent:"#c0392b",
    overdueCardBg:"#3d1414",dueSoonCardBg:"#2d2009",okCardBg:"#0d2b1a",unknownCardBg:"#1a1a2e",
    overdueText:"#ff6b6b",dueSoonText:"#f39c12",okText:"#2ecc71",unknownText:"#95a5a6",
    overdueBorder:"#e74c3c",dueSoonBorder:"#e67e22",okBorder:"#27ae60",unknownBorder:"#7f8c8d",
    tipBg:"#1a1409",tipBorder:"#5a3e00",tipText:"#f39c12",
    tableRowBorder:"#13141a",historyDivider:"#1e2030",noRecordText:"#444",inputBg:"#1a1b24",
    tireAllBorder:"#1a6fa0",tireAllText:"#5bc8f5",tireAllBg:"#0d1e2b",
    tireWinBorder:"#4a5fc0",tireWinText:"#9aa8ff",tireWinBg:"#13162b",
    bh:"1.15",
  } : {
    bg:"#f0f2f7",surface:"#ffffff",surface2:"#f8f9fc",border:"#e0e3ee",border2:"#d0d4e2",
    text:"#1a1b24",textMuted:"#555",textFaint:"#999",accent:"#c0392b",
    overdueCardBg:"#fef0f0",dueSoonCardBg:"#fef8ec",okCardBg:"#f0faf4",unknownCardBg:"#f4f5f9",
    overdueText:"#c0392b",dueSoonText:"#b7770d",okText:"#1e8449",unknownText:"#7f8c8d",
    overdueBorder:"#e74c3c",dueSoonBorder:"#e67e22",okBorder:"#27ae60",unknownBorder:"#c8cdd8",
    tipBg:"#fffbf0",tipBorder:"#f0c040",tipText:"#b7770d",
    tableRowBorder:"#f0f2f7",historyDivider:"#e0e3ee",noRecordText:"#ccc",inputBg:"#f8f9fc",
    tireAllBorder:"#3498db",tireAllText:"#1a6fa0",tireAllBg:"#eaf6fe",
    tireWinBorder:"#5c6bc0",tireWinText:"#3545a8",tireWinBg:"#eeeffe",
    bh:"0.95",
  };
}

// ─── Tread Depth Gauge ───────────────────────────────────────────────────────
function TreadGauge({ depth, dark, T }) {
  const MAX = 12;
  const pct = Math.min(100, Math.max(0, (depth / MAX) * 100));
  const level = getTreadLevel(depth);
  const info = level ? TREAD[level] : null;
  if (!info) return null;

  const segments = [
    { label:"2", pct: 2/MAX*100,  color:"#e74c3c" },
    { label:"4", pct: 4/MAX*100,  color:"#e67e22" },
    { label:"6", pct: 6/MAX*100,  color:"#f39c12" },
    { label:"8", pct: 8/MAX*100,  color:"#2ecc71" },
    { label:"12",pct:12/MAX*100,  color:"#27ae60" },
  ];

  return (
    <div style={{ marginTop:6 }}>
      {/* Segmented bar */}
      <div style={{ position:"relative", height:8, borderRadius:4, overflow:"hidden", background: dark?"#1e2030":"#e0e3ee", marginBottom:4 }}>
        {/* gradient fill */}
        <div style={{ position:"absolute", left:0, top:0, height:"100%", width:`${pct}%`,
          background:`linear-gradient(to right, #e74c3c, #e67e22 33%, #f39c12 50%, #2ecc71 70%, #27ae60)`,
          borderRadius:4, transition:"width 0.5s" }} />
        {/* zone markers */}
        {[2,4,6,8].map(v => (
          <div key={v} style={{ position:"absolute", top:0, bottom:0, left:`${v/MAX*100}%`, width:1, background: dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.12)" }} />
        ))}
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:8, color:T.textFaint, marginBottom:5 }}>
        <span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>12/32"</span>
      </div>
      <div style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"2px 8px", borderRadius:10,
        background: dark ? info.bg_d : info.bg_l, border:`1px solid ${info.color}` }}>
        <div style={{ width:7, height:7, borderRadius:"50%", background:info.color, flexShrink:0 }} />
        <span style={{ fontSize:10, color:info.color, fontWeight:500 }}>{info.label}</span>
        <span style={{ fontSize:10, color:T.textFaint }}>{depth.toFixed(1)}/32"</span>
      </div>
    </div>
  );
}

// ─── Tire Section ─────────────────────────────────────────────────────────────
function TireSection({ vehicle, logs, setLogs, T, dark }) {
  const defaultCfg = {
    allseason:{ brand:"", size:"", intervalMiles:DEFAULT_TIRE_MILES.allseason, mountedAt:"", treadNew:"10", treadAt:"", treadMeasured:[] },
    winter:   { brand:"", size:"", intervalMiles:DEFAULT_TIRE_MILES.winter,    mountedAt:"", treadNew:"10", treadAt:"", treadMeasured:[] },
    active:"none"
  };
  const cfg = vehicle.tireConfig || defaultCfg;
  const updateVehicle = TireSection._updateVehicle;

  const [showEditModal, setShowEditModal] = useState(false);
  const [showLogModal, setShowLogModal]   = useState(false);
  const [showTreadModal, setShowTreadModal] = useState(false);
  const [tireEdit, setTireEdit] = useState({});
  const [logEntry, setLogEntry] = useState({ date:new Date().toISOString().slice(0,10), miles:vehicle.odometer||"", notes:"", isMountSwap:false });
  const [treadEntry, setTreadEntry] = useState({ date:new Date().toISOString().slice(0,10), fl:"", fr:"", rl:"", rr:"", notes:"" });

  const lbl = { fontSize:10, color:T.textFaint, letterSpacing:1, display:"block", marginBottom:4 };

  function openEdit(type) { setTireEdit({ ...cfg[type], type }); setShowEditModal(type); }
  function saveEdit() {
    const { type, ...rest } = tireEdit;
    updateVehicle({ tireConfig:{ ...cfg, [type]:{ ...cfg[type], ...rest } } });
    setShowEditModal(false);
  }

  function openLog(type) {
    setShowLogModal(type);
    setLogEntry({ date:new Date().toISOString().slice(0,10), miles:vehicle.odometer||"", notes:"", isMountSwap:false });
  }

  function openTread(type) {
    setShowTreadModal(type);
    setTreadEntry({ date:new Date().toISOString().slice(0,10), fl:"", fr:"", rl:"", rr:"", notes:"" });
  }

  function saveTread() {
    const type = showTreadModal;
    const entry = { ...treadEntry, miles:vehicle.odometer||"", ts:Date.now() };
    // avg of entered values
    const vals = [treadEntry.fl, treadEntry.fr, treadEntry.rl, treadEntry.rr].map(Number).filter(v => !isNaN(v) && v > 0);
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    const updatedMeasured = [...(cfg[type].treadMeasured||[]), entry];
    updateVehicle({ tireConfig:{ ...cfg, [type]:{ ...cfg[type], treadMeasured:updatedMeasured, treadAt:vehicle.odometer, treadAvg:avg?.toFixed(1) } } });
    setShowTreadModal(false);
  }

  function logTireService(type) {
    const entry = { ...logEntry, ts:Date.now(), tireType:type };
    setLogs(prev => ({
      ...prev,
      [vehicle.id]:{ ...(prev[vehicle.id]||{}), [`tire-${type}`]:[...((prev[vehicle.id]||{})[`tire-${type}`]||[]), entry] }
    }));
    if (logEntry.isMountSwap) {
      updateVehicle({ tireConfig:{ ...cfg, [type]:{ ...cfg[type], mountedAt:logEntry.miles||vehicle.odometer }, active:type } });
    }
    setShowLogModal(false);
    setLogEntry({ date:new Date().toISOString().slice(0,10), miles:vehicle.odometer||"", notes:"", isMountSwap:false });
  }

  function setActive(type) {
    const newActive = cfg.active === type ? "none" : type;
    updateVehicle({ tireConfig:{ ...cfg, active:newActive, [type]:{ ...cfg[type], mountedAt:vehicle.odometer||cfg[type].mountedAt } } });
  }

  function TireCard({ type, showActive=true }) {
    const isAll = type === "allseason";
    const tc = cfg[type];
    const isActive = cfg.active === type;
    const tireLogs = (logs[vehicle.id]||{})[`tire-${type}`] || [];
    const lastLog = tireLogs[tireLogs.length-1];
    const baseMiles = tc.mountedAt || lastLog?.miles;

    // Mileage wear tracking
    const milesDriven = baseMiles && vehicle.odometer ? Number(vehicle.odometer)-Number(baseMiles) : null;
    const milesLeft = milesDriven !== null ? Number(tc.intervalMiles)-milesDriven : null;
    const milePct = milesDriven !== null ? Math.min(100,Math.max(0,(milesDriven/Number(tc.intervalMiles))*100)) : 0;
    const mileStatus = milesStatus(baseMiles, vehicle.odometer, tc.intervalMiles);

    // Tread depth — prefer latest manual measurement, fall back to estimated
    const hasMeasurement = tc.treadAvg && tc.treadAt;
    const estimatedDepth = hasMeasurement
      ? estimatedTread(tc.treadAvg, tc.treadAt, vehicle.odometer)
      : (tc.treadNew && baseMiles ? estimatedTread(tc.treadNew, baseMiles, vehicle.odometer) : null);
    const displayDepth = estimatedDepth;
    const treadLevel = displayDepth !== null ? getTreadLevel(displayDepth) : null;
    const treadInfo = treadLevel ? TREAD[treadLevel] : null;

    // Overall severity = worst of mileage + tread
    const isCritical = mileStatus==="overdue" || treadLevel==="replace";
    const isWarning  = mileStatus==="due-soon" || treadLevel==="plan" || treadLevel==="monitor";

    const accentBorder = isAll ? T.tireAllBorder : T.tireWinBorder;
    const accentText   = isAll ? T.tireAllText   : T.tireWinText;
    const cardBg       = isActive ? (isAll ? T.tireAllBg : T.tireWinBg)
                       : isCritical ? (dark?"#3d1414":"#fef0f0")
                       : isWarning  ? (dark?"#2d2009":"#fef8ec")
                       : (dark?T.surface:T.surface);
    const leftBorder   = isCritical ? T.overdueBorder : isWarning ? T.dueSoonBorder : isActive ? accentBorder : T.border;

    return (
      <div style={{ flex:"1 1 280px", minWidth:0 }}>
        {/* Label */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:7 }}>
          <span style={{ fontSize:16 }}>{isAll ? "🌤️" : "❄️"}</span>
          <span style={{ fontFamily:"'Bebas Neue'", fontSize:14, letterSpacing:2, color:accentText }}>
            {isAll ? "ALL-SEASON" : "WINTER"} TIRES
          </span>
          {isActive && <span style={{ fontSize:9, padding:"2px 8px", borderRadius:10, background:accentBorder, color:"#fff", letterSpacing:1, marginLeft:"auto" }}>MOUNTED</span>}
        </div>

        <div className="card" style={{ padding:14, borderColor:leftBorder, borderLeft:`3px solid ${leftBorder}`, background:cardBg }}>
          {/* Top row: info + buttons */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
            <div>
              {tc.brand
                ? <div style={{ fontSize:12, color:T.text, fontWeight:500 }}>{tc.brand}</div>
                : <div style={{ fontSize:11, color:T.noRecordText, fontStyle:"italic" }}>No info yet</div>}
              {tc.size && <div style={{ fontSize:10, color:T.textFaint }}>{tc.size}</div>}
              <div style={{ fontSize:9, color:T.textFaint, marginTop:2 }}>
                Replace interval: {Number(tc.intervalMiles).toLocaleString()} mi
              </div>
            </div>
            <div style={{ display:"flex", gap:5, flexShrink:0, marginLeft:8 }}>
              <button className="btn btn-ghost" style={{ fontSize:10, padding:"4px 7px" }} title="Edit tire info" onClick={() => openEdit(type)}>✏️</button>
              <button className="btn btn-ghost" style={{ fontSize:10, padding:"4px 7px" }} title="Measure tread" onClick={() => openTread(type)}>📏</button>
              <button className="btn btn-ghost" style={{ fontSize:10, padding:"4px 7px" }} title="Log service" onClick={() => openLog(type)}>+ LOG</button>
            </div>
          </div>

          {/* Mileage progress */}
          {milePct > 0 && (
            <div style={{ marginBottom:6 }}>
              <div style={{ fontSize:9, color:T.textFaint, marginBottom:3, letterSpacing:1 }}>MILEAGE WEAR</div>
              <div style={{ height:5, borderRadius:3, background:dark?"#1e2030":"#e0e3ee", overflow:"hidden", marginBottom:4 }}>
                <div style={{ height:"100%", borderRadius:3, width:`${milePct}%`,
                  background:milePct>=100?"#e74c3c":milePct>=80?"#e67e22":"#27ae60", transition:"width 0.4s" }} />
              </div>
              {milesLeft !== null && (
                <div style={{ fontSize:10, color:milesLeft<=0?T.overdueText:milesLeft<=5000?T.dueSoonText:T.okText }}>
                  {milesLeft<=0 ? `${Math.abs(Math.round(milesLeft)).toLocaleString()} mi overdue` : `${Math.round(milesLeft).toLocaleString()} mi remaining`}
                  {baseMiles && <span style={{ color:T.textFaint }}> · on since {Number(baseMiles).toLocaleString()} mi</span>}
                </div>
              )}
            </div>
          )}

          {/* Tread depth */}
          {displayDepth !== null && (
            <div style={{ marginTop:8, paddingTop:8, borderTop:`1px solid ${T.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:2 }}>
                <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1 }}>TREAD DEPTH</div>
                {hasMeasurement
                  ? <span style={{ fontSize:9, color:T.textFaint }}>measured @ {Number(tc.treadAt).toLocaleString()} mi · estimated now</span>
                  : <span style={{ fontSize:9, color:T.textFaint }}>estimated from new</span>}
              </div>
              <TreadGauge depth={displayDepth} dark={dark} T={T} />
              {/* Most recent manual measurement */}
              {tc.treadMeasured?.length > 0 && (() => {
                const last = tc.treadMeasured[tc.treadMeasured.length-1];
                const positions = [["fl","FL"],["fr","FR"],["rl","RL"],["rr","RR"]].filter(([k]) => last[k]);
                if (!positions.length) return null;
                return (
                  <div style={{ marginTop:8, display:"flex", gap:6, flexWrap:"wrap" }}>
                    {positions.map(([k,label]) => {
                      const d = Number(last[k]);
                      const lv = getTreadLevel(d);
                      const info = lv ? TREAD[lv] : null;
                      return (
                        <div key={k} style={{ textAlign:"center", padding:"4px 8px", borderRadius:6,
                          background: dark?(info?.bg_d||T.surface2):(info?.bg_l||T.surface2),
                          border:`1px solid ${info?.color||T.border}` }}>
                          <div style={{ fontSize:9, color:T.textFaint }}>{label}</div>
                          <div style={{ fontSize:12, color:info?.color||T.text, fontWeight:600 }}>{d}</div>
                          <div style={{ fontSize:8, color:T.textFaint }}>/32"</div>
                        </div>
                      );
                    })}
                    <div style={{ fontSize:9, color:T.textFaint, alignSelf:"center", marginLeft:2 }}>
                      as of {last.date}
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* Mount toggle — only shown when winter tires exist (so "active" makes sense) */}
          {showActive && (
            <div style={{ marginTop:10, paddingTop:8, borderTop:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span style={{ fontSize:10, color:T.textFaint }}>{isActive ? "Currently mounted" : "Not mounted"}</span>
              <button className="btn" style={{ fontSize:10, padding:"4px 12px", background:isActive?accentBorder:T.border2, color:isActive?"#fff":T.textMuted }} onClick={() => setActive(type)}>
                {isActive ? "✓ MOUNTED" : "SET ACTIVE"}
              </button>
            </div>
          )}

          {lastLog && (
            <div style={{ marginTop:5, fontSize:9, color:T.textFaint }}>
              Last service: {lastLog.date}{lastLog.miles ? ` @ ${Number(lastLog.miles).toLocaleString()} mi` : ""}
            </div>
          )}
        </div>
      </div>
    );
  }

  const hasWinter = vehicle.winterTires === true;

  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <div style={{ fontFamily:"'Bebas Neue'", fontSize:16, letterSpacing:3, color:T.textMuted }}>TIRES</div>
        {!hasWinter && (
          <button className="btn btn-ghost" style={{ fontSize:10, padding:"4px 12px" }}
            onClick={() => updateVehicle({ winterTires: true })}>
            + ADD WINTER TIRES
          </button>
        )}
        {hasWinter && (
          <button className="btn btn-ghost" style={{ fontSize:10, padding:"4px 12px", color:T.overdueBorder }}
            onClick={() => { if(confirm("Remove winter tire tracking?")) updateVehicle({ winterTires: false, tireConfig: { ...cfg, active: cfg.active==="winter"?"none":cfg.active } }); }}>
            ✕ REMOVE WINTER TIRES
          </button>
        )}
      </div>
      <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
        <TireCard type="allseason" showActive={hasWinter} />
        {hasWinter && <TireCard type="winter" showActive={true} />}
      </div>

      {/* ── Edit tire info modal ── */}
      {showEditModal && (
        <div className="overlay" onClick={() => setShowEditModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:20, letterSpacing:3, marginBottom:16, color:T.text }}>
              {showEditModal==="allseason" ? "🌤️ ALL-SEASON" : "❄️ WINTER"} TIRE INFO
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
              <div><label style={lbl}>BRAND / MODEL</label>
                <input placeholder="e.g. Michelin CrossClimate2" value={tireEdit.brand||""} onChange={e=>setTireEdit(p=>({...p,brand:e.target.value}))} /></div>
              <div><label style={lbl}>TIRE SIZE</label>
                <input placeholder="e.g. 225/65R17" value={tireEdit.size||""} onChange={e=>setTireEdit(p=>({...p,size:e.target.value}))} /></div>
              <div><label style={lbl}>REPLACE INTERVAL (miles)</label>
                <input type="number" placeholder={showEditModal==="allseason"?"50000":"30000"} value={tireEdit.intervalMiles||""} onChange={e=>setTireEdit(p=>({...p,intervalMiles:e.target.value}))} />
                <div style={{ fontSize:9, color:T.textFaint, marginTop:3 }}>Typical: all-season 40–70k · winter 25–40k</div>
              </div>
              <div><label style={lbl}>TREAD DEPTH WHEN NEW (32nds)</label>
                <input type="number" step="0.5" min="0" max="16" placeholder="10" value={tireEdit.treadNew||""} onChange={e=>setTireEdit(p=>({...p,treadNew:e.target.value}))} />
                <div style={{ fontSize:9, color:T.textFaint, marginTop:3 }}>Most new tires are 10/32". Performance tires may be 8/32". Winter tires 10–12/32".</div>
              </div>
              <div><label style={lbl}>ODOMETER WHEN MOUNTED / INSTALLED</label>
                <input type="number" placeholder={vehicle.odometer||"e.g. 45000"} value={tireEdit.mountedAt||""} onChange={e=>setTireEdit(p=>({...p,mountedAt:e.target.value}))} /></div>
              <div style={{ display:"flex", gap:8, marginTop:4 }}>
                <button className="btn btn-primary" style={{ flex:1 }} onClick={saveEdit}>SAVE</button>
                <button className="btn btn-ghost" onClick={() => setShowEditModal(false)}>CANCEL</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Tread measurement modal ── */}
      {showTreadModal && (
        <div className="overlay" onClick={() => setShowTreadModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:20, letterSpacing:3, marginBottom:6, color:T.text }}>
              📏 MEASURE TREAD DEPTH
            </div>
            <div style={{ fontSize:11, color:T.textFaint, marginBottom:16 }}>
              Enter measurements in 32nds of an inch. Use a tread depth gauge or the penny/quarter test.
              <br/><span style={{ color:T.dueSoonText }}>Quarter test: top of Washington's head = 4/32" · replace at ≤2/32"</span>
            </div>

            {/* Tire diagram */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              {[["fl","Front Left 🔲"],["fr","Front Right 🔲"],["rl","Rear Left 🔲"],["rr","Rear Right 🔲"]].map(([k,label]) => {
                const val = treadEntry[k];
                const lv = val ? getTreadLevel(val) : null;
                const info = lv ? TREAD[lv] : null;
                return (
                  <div key={k} style={{ padding:"10px 12px", borderRadius:8,
                    background: info ? (dark?info.bg_d:info.bg_l) : T.surface2,
                    border:`1px solid ${info?.color||T.border2}` }}>
                    <label style={{ ...lbl, color:info?.color||T.textFaint }}>{label}</label>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <input type="number" step="0.5" min="0" max="16" placeholder="—" value={treadEntry[k]}
                        onChange={e => setTreadEntry(p=>({...p,[k]:e.target.value}))}
                        style={{ fontSize:18, fontWeight:700, textAlign:"center", color:info?.color||T.text, padding:"6px 8px" }} />
                      <span style={{ fontSize:11, color:T.textFaint }}>/32"</span>
                    </div>
                    {info && <div style={{ fontSize:9, color:info.color, marginTop:2 }}>{info.label}</div>}
                  </div>
                );
              })}
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <div><label style={lbl}>DATE MEASURED</label>
                <input type="date" value={treadEntry.date} onChange={e=>setTreadEntry(p=>({...p,date:e.target.value}))} /></div>
              <div><label style={lbl}>NOTES (optional)</label>
                <textarea rows={2} placeholder="Shop, conditions..." value={treadEntry.notes} onChange={e=>setTreadEntry(p=>({...p,notes:e.target.value}))} style={{ resize:"vertical" }} /></div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="btn btn-primary" style={{ flex:1 }} onClick={saveTread}>SAVE MEASUREMENTS</button>
                <button className="btn btn-ghost" onClick={() => setShowTreadModal(false)}>CANCEL</button>
              </div>
            </div>

            {/* Tread reference */}
            <div style={{ marginTop:16, borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
              <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:8 }}>TREAD REFERENCE</div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {Object.entries(TREAD).map(([k,v]) => (
                  <div key={k} style={{ display:"flex", alignItems:"center", gap:8, fontSize:10 }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:v.color, flexShrink:0 }} />
                    <span style={{ color:T.textFaint, width:50 }}>≥{v.min}/32"</span>
                    <span style={{ color:v.color }}>{v.label}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Past measurements */}
            {cfg[showTreadModal]?.treadMeasured?.length > 0 && (
              <div style={{ marginTop:14, borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
                <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:8 }}>PAST MEASUREMENTS</div>
                {[...cfg[showTreadModal].treadMeasured].reverse().slice(0,5).map((m,i) => {
                  const vals = [m.fl,m.fr,m.rl,m.rr].filter(Boolean).map(Number);
                  const avg = vals.length ? (vals.reduce((a,b)=>a+b)/vals.length).toFixed(1) : "—";
                  return (
                    <div key={i} style={{ fontSize:11, color:T.textMuted, marginBottom:4, display:"flex", gap:10 }}>
                      <span>{m.date}</span>
                      <span style={{ color:T.textFaint }}>avg {avg}/32"</span>
                      <span style={{ color:T.textFaint }}>FL:{m.fl||"—"} FR:{m.fr||"—"} RL:{m.rl||"—"} RR:{m.rr||"—"}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Log service modal ── */}
      {showLogModal && (
        <div className="overlay" onClick={() => setShowLogModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:20, letterSpacing:3, marginBottom:16, color:T.text }}>
              {showLogModal==="allseason" ? "🌤️ ALL-SEASON" : "❄️ WINTER"} TIRE SERVICE
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
              <div><label style={lbl}>DATE</label>
                <input type="date" value={logEntry.date} onChange={e=>setLogEntry(p=>({...p,date:e.target.value}))} /></div>
              <div><label style={lbl}>ODOMETER (miles)</label>
                <input type="number" placeholder={vehicle.odometer||"e.g. 52000"} value={logEntry.miles} onChange={e=>setLogEntry(p=>({...p,miles:e.target.value}))} /></div>
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", borderRadius:8,
                background:T.surface2, border:`1px solid ${logEntry.isMountSwap?T.accent:T.border2}`, cursor:"pointer" }}
                onClick={() => setLogEntry(p=>({...p,isMountSwap:!p.isMountSwap}))}>
                <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${logEntry.isMountSwap?T.accent:T.border2}`,
                  background:logEntry.isMountSwap?T.accent:"transparent", display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:11, color:"#fff", flexShrink:0 }}>{logEntry.isMountSwap?"✓":""}</div>
                <div>
                  <div style={{ fontSize:12, color:T.text }}>Tire swap / mount</div>
                  <div style={{ fontSize:10, color:T.textFaint }}>Updates mounted-since odometer & sets as active</div>
                </div>
              </div>
              <div><label style={lbl}>NOTES (optional)</label>
                <textarea rows={2} placeholder="Rotation, balancing, shop..." value={logEntry.notes} onChange={e=>setLogEntry(p=>({...p,notes:e.target.value}))} style={{ resize:"vertical" }} /></div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="btn btn-primary" style={{ flex:1 }} onClick={() => logTireService(showLogModal)}>✓ LOG SERVICE</button>
                <button className="btn btn-ghost" onClick={() => setShowLogModal(false)}>CANCEL</button>
              </div>
            </div>
            {((logs[vehicle.id]||{})[`tire-${showLogModal}`]||[]).length > 0 && (
              <div style={{ marginTop:16, borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
                <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:8 }}>HISTORY</div>
                {[...((logs[vehicle.id]||{})[`tire-${showLogModal}`]||[])].reverse().map((l,i) => (
                  <div key={i} style={{ fontSize:11, color:T.textMuted, marginBottom:4, paddingBottom:4, borderBottom:`1px solid ${T.historyDivider}` }}>
                    {l.date}{l.miles?` · ${Number(l.miles).toLocaleString()} mi`:""}{l.isMountSwap?" · 🔄 swap":""}{l.notes?` · ${l.notes}`:""}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [vehicles, setVehicles]         = useState([]);
  const [logs, setLogs]                 = useState({});
  const [activeVehicle, setActiveVehicle] = useState(null);
  const [showAddVehicle, setShowAddVehicle] = useState(false);
  const [showLogModal, setShowLogModal] = useState(null);
  const [newVehicle, setNewVehicle]     = useState({ nickname:"",make:"",model:"",year:"",vin:"",odometer:"" });
  const [logEntry, setLogEntry]         = useState({ date:new Date().toISOString().slice(0,10), miles:"", notes:"" });
  const [showTip, setShowTip]           = useState(true);
  const [notifPerm, setNotifPerm]       = useState(() => typeof Notification !== "undefined" ? Notification.permission : "unsupported");
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [showCostPanel, setShowCostPanel]   = useState(false);
  const [showCarfaxModal, setShowCarfaxModal] = useState(false);
  const [carfaxParsing, setCarfaxParsing]   = useState(false);
  const [carfaxResult, setCarfaxResult]     = useState(null);
  const [dark, setDark]                 = useState(() => window.matchMedia?.("(prefers-color-scheme: dark)").matches ?? true);

  useEffect(() => {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const h = e => setDark(e.matches);
    mq.addEventListener("change", h);
    return () => mq.removeEventListener("change", h);
  }, []);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        setVehicles(d.vehicles||[]);
        setLogs(d.logs||{});
        if (d.vehicles?.length) setActiveVehicle(d.vehicles[0].id);
      }
    } catch {}
  }, []);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ vehicles, logs }));
  }, [vehicles, logs]);

  // ── Notification helpers ──────────────────────────────────────────────────
  async function requestNotifPermission() {
    if (typeof Notification === "undefined") return;
    const result = await Notification.requestPermission();
    setNotifPerm(result);
    return result;
  }

  function sendNotif(title, body, tag) {
    if (Notification.permission !== "granted") return;
    try {
      new Notification(title, { body, tag, icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0c10'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%9B%A2%3C/text%3E%3C/svg%3E" });
    } catch(e) {}
  }

  function checkAndNotify() {
    if (!vehicles.length || Notification.permission !== "granted") return;
    vehicles.forEach(v => {
      const vLogs = logs[v.id] || {};
      STATIC_ITEMS.forEach(item => {
        const itemLogs = vLogs[item.id] || [];
        const last = itemLogs[itemLogs.length - 1];
        let status = "ok";
        const eff = item.id === "oil-change" ? Number(v.oilInterval || item.intervalMiles) : item.intervalMiles;
        if (item.type === "mileage") status = milesStatus(last?.miles, v.odometer, eff);
        if (item.type === "time")    status = timeStatus(last?.date, item.intervalMonths);
        const label = v.nickname || `${v.year} ${v.make} ${v.model}`;
        const tag = `ak-${v.id}-${item.id}`;
        if (status === "overdue") {
          sendNotif(`${item.icon} ${item.name} OVERDUE`, `${label} — this service is past due.`, tag);
        } else if (status === "due-soon") {
          sendNotif(`${item.icon} ${item.name} due soon`, `${label} — coming up soon.`, tag);
        }
      });
    });
  }

  // Check on app open
  useEffect(() => {
    if (vehicles.length) checkAndNotify();
  }, [vehicles.length]);

  const T = makeTheme(dark);
  const vehicle = vehicles.find(v => v.id === activeVehicle);

  TireSection._updateVehicle = (patch) => {
    setVehicles(prev => prev.map(v => v.id === activeVehicle ? { ...v, ...patch } : v));
  };

  const STATUS = {
    overdue:    { label:"OVERDUE",  bg:T.overdueCardBg, border:T.overdueBorder, text:T.overdueText },
    "due-soon": { label:"DUE SOON", bg:T.dueSoonCardBg, border:T.dueSoonBorder, text:T.dueSoonText },
    ok:         { label:"OK",       bg:T.okCardBg,      border:T.okBorder,      text:T.okText },
    unknown:    { label:"LOG IT",   bg:T.unknownCardBg, border:T.unknownBorder, text:T.unknownText },
  };

  const lbl = { fontSize:10, color:T.textFaint, letterSpacing:1, display:"block", marginBottom:4 };

  function addVehicle() {
    if (!newVehicle.make||!newVehicle.model||!newVehicle.year) return;
    const id = genId();
    const tireConfig = {
      allseason:{ brand:"",size:"",intervalMiles:DEFAULT_TIRE_MILES.allseason,mountedAt:"",treadNew:"10",treadAt:"",treadMeasured:[] },
      winter:   { brand:"",size:"",intervalMiles:DEFAULT_TIRE_MILES.winter,   mountedAt:"",treadNew:"10",treadAt:"",treadMeasured:[] },
      active:"none"
    };
    setVehicles(prev => [...prev, { ...newVehicle, id, tireConfig, oilInterval: 5000, winterTires: false, skipped: {} }]);
    setActiveVehicle(id);
    setShowAddVehicle(false);
    setNewVehicle({ nickname:"",make:"",model:"",year:"",vin:"",odometer:"" });
  }

  function deleteVehicle(id) {
    setVehicles(prev => prev.filter(v => v.id!==id));
    setLogs(prev => { const n={...prev}; delete n[id]; return n; });
    setActiveVehicle(vehicles.filter(v => v.id!==id)[0]?.id||null);
  }

  function getVehicleLogs(vid) { return logs[vid]||{}; }

  function logMaintenance() {
    if (!showLogModal||!vehicle) return;
    setLogs(prev => ({
      ...prev,
      [vehicle.id]:{ ...(prev[vehicle.id]||{}), [showLogModal]:[...((prev[vehicle.id]||{})[showLogModal]||[]), { ...logEntry, ts:Date.now() }] }
    }));
    setShowLogModal(null);
    setLogEntry({ date:new Date().toISOString().slice(0,10), miles:"", notes:"" });
  }

  function effectiveInterval(item) {
    if (item.id === "oil-change") return Number(vehicle?.oilInterval || item.intervalMiles);
    return item.intervalMiles;
  }

  function getItemStatus(item) {
    if (!vehicle) return "unknown";
    const vLogs = getVehicleLogs(vehicle.id)[item.id]||[];
    const last = vLogs[vLogs.length-1];
    if (item.type==="mileage") return milesStatus(last?.miles, vehicle.odometer, effectiveInterval(item));
    if (item.type==="time")    return timeStatus(last?.date, item.intervalMonths);
    return last ? "ok" : "unknown";
  }

  function getMilesTill(item) {
    if (!vehicle||item.type!=="mileage") return null;
    const last = (getVehicleLogs(vehicle.id)[item.id]||[]).slice(-1)[0];
    if (!last?.miles||!vehicle.odometer) return null;
    return effectiveInterval(item)-(Number(vehicle.odometer)-Number(last.miles));
  }

  function getTimeTill(item) {
    if (!vehicle||item.type!=="time") return null;
    const last = (getVehicleLogs(vehicle.id)[item.id]||[]).slice(-1)[0];
    if (!last?.date) return null;
    const d = new Date(last.date);
    d.setMonth(d.getMonth()+item.intervalMonths);
    return Math.round((d-new Date())/86400000);
  }

  const overdueCount = vehicle ? STATIC_ITEMS.filter(i=>getItemStatus(i)==="overdue" && !vehicle.skipped?.[i.id]).length : 0;
  const dueSoonCount = vehicle ? STATIC_ITEMS.filter(i=>getItemStatus(i)==="due-soon" && !vehicle.skipped?.[i.id]).length : 0;

  function allHistoryRows() {
    if (!vehicle) return [];
    const staticRows = STATIC_ITEMS.flatMap(item =>
      (getVehicleLogs(vehicle.id)[item.id]||[]).map((log,i) => ({ ...log, itemName:item.name, icon:item.icon, key:`${item.id}-${i}`, ts:log.ts||0 }))
    );
    const tireRows = ["allseason","winter"].flatMap(type =>
      ((logs[vehicle.id]||{})[`tire-${type}`]||[]).map((log,i) => ({
        ...log, icon:type==="allseason"?"🌤️":"❄️",
        itemName:`${type==="allseason"?"All-Season":"Winter"} Tires${log.isMountSwap?" (swap)":""}`,
        key:`tire-${type}-${i}`, ts:log.ts||0
      }))
    );
    return [...staticRows,...tireRows].sort((a,b)=>b.ts-a.ts);
  }

  async function exportCSV() {
    if (!vehicle) return;
    const rows = allHistoryRows();
    const vehicleLabel = vehicle.nickname || `${vehicle.year} ${vehicle.make} ${vehicle.model}`;
    const filename = `autokeeper-${vehicleLabel.replace(/[^a-z0-9]/gi, "-").toLowerCase()}.csv`;
    const header = ["Date","Service","Odometer (mi)","Notes"];
    const lines = [
      `# AutoKeeper Export — ${vehicleLabel}`,
      `# VIN: ${vehicle.vin || "N/A"}`,
      `# Exported: ${new Date().toLocaleDateString()}`,
      "",
      header.join(","),
      ...rows.map(r => [
        r.date || "",
        `"${(r.itemName || "").replace(/"/g, '""')}"`,
        r.miles ? Number(r.miles) : "",
        `"${(r.notes || "").replace(/"/g, '""')}"`,
      ].join(","))
    ];
    const csv = lines.join("\n");

    // Desktop: use File System Access API for save-as dialog (Chrome/Edge on desktop)
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: "CSV File", accept: { "text/csv": [".csv"] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(csv);
        await writable.close();
        return;
      } catch (e) {
        if (e.name === "AbortError") return; // user cancelled
        // fall through to fallback
      }
    }

    // Mobile & other browsers: standard download (triggers native save sheet on iOS/Android)
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');
    *{box-sizing:border-box} body{margin:0}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:${T.bg}} ::-webkit-scrollbar-thumb{background:${T.border2};border-radius:2px}
    .card{background:${T.surface};border:1px solid ${T.border};border-radius:10px}
    .btn{cursor:pointer;border:none;border-radius:6px;font-family:inherit;font-size:13px;padding:8px 16px;transition:all 0.15s}
    .btn:hover{filter:brightness(${T.bh});transform:translateY(-1px)}
    .btn-primary{background:${T.accent};color:#fff}
    .btn-ghost{background:transparent;border:1px solid ${T.border2};color:${T.textMuted}}
    .btn-ghost:hover{border-color:${dark?"#666":"#aaa"};color:${T.text}}
    input,select,textarea{background:${T.inputBg};border:1px solid ${T.border2};border-radius:6px;color:${T.text};font-family:inherit;font-size:13px;padding:8px 12px;width:100%;outline:none}
    input:focus,select:focus,textarea:focus{border-color:${T.accent}}
    select option{background:${T.surface};color:${T.text}}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:${dark?"invert(1)":"none"}}
    .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;letter-spacing:1px}
    .vtab{cursor:pointer;padding:8px 16px;border-radius:8px;font-size:12px;transition:all 0.15s;white-space:nowrap;border:1px solid transparent;color:${T.textFaint};font-family:'DM Mono',monospace}
    .vtab.active{background:${T.surface};border-color:${T.accent};color:${T.text}}
    .vtab:hover:not(.active){color:${T.textMuted}}
    .mitem{transition:all 0.2s;cursor:pointer}
    .mitem:hover{transform:translateY(-2px);box-shadow:0 4px 16px ${dark?"rgba(0,0,0,0.4)":"rgba(0,0,0,0.08)"}}
    .overlay{position:fixed;inset:0;background:${dark?"rgba(0,0,0,0.72)":"rgba(0,0,0,0.32)"};display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);padding:16px}
    .modal{background:${T.surface};border:1px solid ${T.border2};border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
    .sec-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:3px;color:${T.textMuted};margin-bottom:12px}
  `;

  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'DM Mono','Courier New',monospace" }}>
      <style>{css}</style>

      {/* Header */}
      <div style={{ borderBottom:`1px solid ${T.border}`, padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, background:T.surface, position:"sticky", top:0, zIndex:10 }}>
        <div>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:26, letterSpacing:3, color:T.text, lineHeight:1 }}>
            <span style={{ color:T.accent }}>AUTO</span>KEEPER
          </div>
          <div style={{ fontSize:9, color:T.textFaint, letterSpacing:2, marginTop:2 }}>VEHICLE MAINTENANCE TRACKER</div>
          <div style={{ fontSize:8, color:T.textFaint, letterSpacing:1, marginTop:1, opacity:0.6 }}>v{APP_VERSION}</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <button className="btn btn-ghost" style={{ fontSize:16, padding:"6px 10px", position:"relative" }}
            onClick={() => setShowNotifPanel(true)} title="Notification settings">
            🔔
            {notifPerm === "granted" && <span style={{ position:"absolute", top:4, right:4, width:6, height:6, borderRadius:"50%", background:"#27ae60" }} />}
          </button>
          <button className="btn btn-ghost" style={{ fontSize:11, padding:"6px 10px" }}
            onClick={() => setShowCostPanel(true)} title="Financial analysis">💰</button>
          <button className="btn btn-primary" onClick={() => setShowAddVehicle(true)} style={{ fontSize:11, letterSpacing:1 }}>+ ADD VEHICLE</button>
        </div>
      </div>

      {/* Tip */}
      {showTip && (
        <div style={{ margin:"14px 20px 0", background:T.tipBg, border:`1px solid ${T.tipBorder}`, borderRadius:8, padding:"9px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", fontSize:11, color:T.tipText }}>
          <span>{TIP}</span>
          <button onClick={() => setShowTip(false)} style={{ background:"none", border:"none", color:T.tipText, cursor:"pointer", fontSize:18, padding:0, marginLeft:10, lineHeight:1 }}>×</button>
        </div>
      )}

      {/* Vehicle Tabs */}
      {vehicles.length > 0 && (
        <div style={{ padding:"14px 20px 0", display:"flex", gap:8, overflowX:"auto" }}>
          {vehicles.map(v => (
            <div key={v.id} className={`vtab ${activeVehicle===v.id?"active":""}`} onClick={() => setActiveVehicle(v.id)}>
              {v.nickname||`${v.year} ${v.make} ${v.model}`}
            </div>
          ))}
        </div>
      )}

      <div style={{ padding:"16px 20px 40px" }}>
        {!vehicle ? (
          <div style={{ textAlign:"center", padding:"72px 20px", color:T.textFaint }}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:22, letterSpacing:3, marginTop:14, color:T.textMuted }}>NO VEHICLES YET</div>
            <div style={{ fontSize:12, marginTop:6 }}>Add your first vehicle to start tracking maintenance</div>
            <button className="btn btn-primary" style={{ marginTop:18 }} onClick={() => setShowAddVehicle(true)}>+ ADD YOUR FIRST VEHICLE</button>
          </div>
        ) : (
          <>
            {/* Vehicle info bar */}
            <div className="card" style={{ padding:"14px 18px", marginBottom:20, display:"flex", flexWrap:"wrap", gap:14, alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Bebas Neue'", fontSize:20, letterSpacing:2, color:T.text }}>
                  {vehicle.nickname||`${vehicle.year} ${vehicle.make} ${vehicle.model}`}
                </div>
                <div style={{ fontSize:10, color:T.textFaint, display:"flex", gap:10, marginTop:2, flexWrap:"wrap" }}>
                  {vehicle.year&&<span>{vehicle.year}</span>}
                  {vehicle.make&&<span>{vehicle.make}</span>}
                  {vehicle.model&&<span>{vehicle.model}</span>}
                  {vehicle.vin&&<span style={{ color:T.accent }}>VIN: {vehicle.vin}</span>}
                </div>
              </div>
              <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontFamily:"'Bebas Neue'", fontSize:22, color:T.text }}>{vehicle.odometer?Number(vehicle.odometer).toLocaleString():"—"}</div>
                  <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1 }}>MILES</div>
                </div>
                {overdueCount>0&&<span className="tag" style={{ background:T.overdueCardBg,color:T.overdueText,border:`1px solid ${T.overdueBorder}` }}>{overdueCount} OVERDUE</span>}
                {dueSoonCount>0&&<span className="tag" style={{ background:T.dueSoonCardBg,color:T.dueSoonText,border:`1px solid ${T.dueSoonBorder}` }}>{dueSoonCount} DUE SOON</span>}
                <div style={{ display:"flex", gap:6 }}>
                  <button className="btn btn-ghost" style={{ fontSize:10, padding:"6px 11px" }} onClick={() => {
                    const odo = prompt("Enter corrected odometer reading (miles):", vehicle.odometer||"");
                    if (odo!==null&&!isNaN(odo)&&odo.trim()!=="")
                      setVehicles(prev => prev.map(v => v.id===vehicle.id?{...v,odometer:odo.trim()}:v));
                  }}>✏️ ODO</button>
                  <button className="btn btn-ghost" style={{ fontSize:10, padding:"6px 9px" }}
                    onClick={() => setShowCarfaxModal(true)} title="Import Carfax PDF">📄 CARFAX</button>
                  <button className="btn btn-ghost" style={{ fontSize:10, padding:"6px 9px", color:"#e74c3c" }} onClick={() => {
                    if (confirm(`Delete ${vehicle.nickname||vehicle.model}?`)) deleteVehicle(vehicle.id);
                  }}>🗑</button>
                </div>
              </div>
            </div>

            {/* ── Tires ── */}
            <TireSection vehicle={vehicle} logs={logs} setLogs={setLogs} T={T} dark={dark} />

            {/* ── Maintenance ── */}
            <div className="sec-title">MAINTENANCE</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(285px,1fr))", gap:12, marginBottom:28 }}>
              {STATIC_ITEMS.map(item => {
                const status = getItemStatus(item);
                const sc = STATUS[status];
                const vLogs = getVehicleLogs(vehicle.id)[item.id]||[];
                const lastLog = vLogs[vLogs.length-1];
                const milesTill = getMilesTill(item);
                const daysTill = getTimeTill(item);
                let pct = 0;
                if (item.type==="mileage"&&milesTill!==null) {
                  const eff = item.id==="oil-change" ? Number(vehicle.oilInterval||item.intervalMiles) : item.intervalMiles;
                  pct=Math.min(100,Math.max(0,((eff-milesTill)/eff)*100));
                }
                if (item.type==="time"&&daysTill!==null)
                  pct=Math.min(100,Math.max(0,((item.intervalMonths*30-daysTill)/(item.intervalMonths*30))*100));
                return (
                  <div key={item.id} className="card mitem"
                    style={{ padding:16, borderColor:sc.border, borderLeft:`3px solid ${sc.border}`, background:sc.bg }}
                    onClick={() => { setShowLogModal(item.id); setLogEntry({ date:new Date().toISOString().slice(0,10), miles:vehicle.odometer||"", notes:"" }); }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                      <div style={{ display:"flex", gap:9, alignItems:"flex-start" }}>
                        <span style={{ fontSize:20 }}>{item.icon}</span>
                        <div>
                          <div style={{ fontSize:12, fontWeight:500, color:T.text, marginBottom:2 }}>{item.name}</div>
                          <div style={{ fontSize:10, color:T.textFaint }}>{item.description}</div>
                        </div>
                      </div>
                      <span className="tag" style={{ background:"transparent", color:sc.text, border:`1px solid ${sc.border}`, marginLeft:6, flexShrink:0, fontSize:9 }}>{sc.label}</span>
                    </div>
                    <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:7 }}>
                      {item.id==="oil-change"
                        ? `Every ${Number(vehicle.oilInterval||5000).toLocaleString()} miles`
                        : item.intervalLabel}
                    </div>
                    {item.id==="oil-change"&&(
                      <div style={{ display:"flex", gap:5, marginBottom:8 }} onClick={e=>e.stopPropagation()}>
                        {[3000,5000,"custom"].map(opt => {
                          const isCustom = opt==="custom";
                          const curInterval = Number(vehicle.oilInterval||5000);
                          const isActive = isCustom ? (curInterval!==3000&&curInterval!==5000) : curInterval===opt;
                          return (
                            <button key={opt} className="btn" style={{
                              fontSize:10, padding:"3px 10px", borderRadius:20,
                              background: isActive ? T.accent : "transparent",
                              color: isActive ? "#fff" : T.textMuted,
                              border:`1px solid ${isActive ? T.accent : T.border2}`,
                            }} onClick={() => {
                              if (isCustom) {
                                const val = prompt("Enter custom oil change interval (miles):", curInterval);
                                if (val!==null && !isNaN(val) && Number(val)>0)
                                  setVehicles(prev => prev.map(v => v.id===vehicle.id?{...v,oilInterval:Number(val)}:v));
                              } else {
                                setVehicles(prev => prev.map(v => v.id===vehicle.id?{...v,oilInterval:opt}:v));
                              }
                            }}>
                              {isCustom ? (isActive ? `${curInterval.toLocaleString()} mi ✏️` : "custom") : `${opt.toLocaleString()}`}
                            </button>
                          );
                        })}
                      </div>
                    )}
                    {pct>0&&(
                      <div style={{ height:4, borderRadius:2, background:T.border, overflow:"hidden", marginBottom:6 }}>
                        <div style={{ height:"100%", borderRadius:2, width:`${pct}%`, background:pct>=100?"#e74c3c":pct>=80?"#e67e22":"#27ae60", transition:"width 0.4s" }} />
                      </div>
                    )}
                    {milesTill!==null&&(
                      <div style={{ fontSize:10, color:milesTill<=0?T.overdueText:milesTill<=5000?T.dueSoonText:T.okText }}>
                        {milesTill<=0?`${Math.abs(milesTill).toLocaleString()} mi overdue`:`${milesTill.toLocaleString()} mi remaining`}
                      </div>
                    )}
                    {daysTill!==null&&(
                      <div style={{ fontSize:10, color:daysTill<=0?T.overdueText:daysTill<=60?T.dueSoonText:T.okText }}>
                        {daysTill<=0?`${Math.abs(daysTill)} days overdue`:`${daysTill} days remaining`}
                      </div>
                    )}
                    {lastLog&&(
                      <div style={{ marginTop:7, paddingTop:7, borderTop:`1px solid ${T.border}`, fontSize:9, color:T.textFaint }}>
                        Last: {lastLog.date}{lastLog.miles?` @ ${Number(lastLog.miles).toLocaleString()} mi`:""}{lastLog.notes?` — ${lastLog.notes}`:""}
                      </div>
                    )}
                    {/* Skip toggle for winter-specific items */}
                    {SKIPPABLE_ITEMS[item.id] && (
                      <div style={{ marginTop:8, paddingTop:7, borderTop:`1px solid ${T.border}` }} onClick={e=>e.stopPropagation()}>
                        {vehicle.skipped?.[item.id] ? (
                          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                            <span style={{ fontSize:9, color:T.textFaint, fontStyle:"italic" }}>Skipped — not applicable for your climate</span>
                            <button className="btn btn-ghost" style={{ fontSize:9, padding:"2px 8px" }}
                              onClick={() => setVehicles(prev => prev.map(v => v.id===vehicle.id ? {...v, skipped:{...(v.skipped||{}), [item.id]:false}} : v))}>
                              UNDO
                            </button>
                          </div>
                        ) : (
                          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
                            <span style={{ fontSize:9, color:T.textFaint, flex:1, lineHeight:1.5 }}>{SKIPPABLE_ITEMS[item.id].reason}</span>
                            <button className="btn btn-ghost" style={{ fontSize:9, padding:"2px 8px", flexShrink:0 }}
                              onClick={() => setVehicles(prev => prev.map(v => v.id===vehicle.id ? {...v, skipped:{...(v.skipped||{}), [item.id]:true}} : v))}>
                              SKIP
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                    {vLogs.length===0&&!vehicle.skipped?.[item.id]&&<div style={{ fontSize:10, color:T.noRecordText, marginTop:3 }}>No records yet — tap to log</div>}
                    {vehicle.skipped?.[item.id]&&<div style={{ fontSize:10, color:T.textFaint, marginTop:3, fontStyle:"italic" }}>Not tracked for your location</div>}
                  </div>
                );
              })}
            </div>

            {/* ── History ── */}
            {allHistoryRows().length>0&&(
              <div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                  <div className="sec-title" style={{ marginBottom:0 }}>MAINTENANCE HISTORY</div>
                  <button className="btn btn-ghost" style={{ fontSize:10, padding:"5px 12px", display:"flex", alignItems:"center", gap:5 }} onClick={exportCSV}>
                    ⬇ CSV
                  </button>
                </div>
                <div className="card" style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                    <thead>
                      <tr style={{ borderBottom:`1px solid ${T.border}` }}>
                        {["DATE","SERVICE","MILES","NOTES"].map(h=>(
                          <th key={h} style={{ padding:"9px 14px", textAlign:"left", color:T.textFaint, fontWeight:400, letterSpacing:1, fontSize:9 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {allHistoryRows().map(row=>(
                        <tr key={row.key} style={{ borderBottom:`1px solid ${T.tableRowBorder}` }}>
                          <td style={{ padding:"9px 14px", color:T.textMuted }}>{row.date}</td>
                          <td style={{ padding:"9px 14px", color:T.text }}>{row.icon} {row.itemName}</td>
                          <td style={{ padding:"9px 14px", color:T.textMuted }}>{row.miles?Number(row.miles).toLocaleString():"—"}</td>
                          <td style={{ padding:"9px 14px", color:T.textFaint }}>{row.notes||"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* Notification Panel Modal */}
      {showNotifPanel && (
        <div className="overlay" onClick={() => setShowNotifPanel(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:22, letterSpacing:3, marginBottom:6, color:T.text }}>🔔 NOTIFICATIONS</div>
            <div style={{ fontSize:11, color:T.textFaint, marginBottom:20, lineHeight:1.7 }}>
              AutoKeeper can send you reminders when maintenance is overdue or coming up soon.
              Notifications are checked each time you open the app.
            </div>

            {/* Permission status */}
            {notifPerm === "unsupported" && (
              <div style={{ padding:"12px 14px", borderRadius:8, background:T.surface2, border:`1px solid ${T.border2}`, fontSize:11, color:T.textFaint, marginBottom:16 }}>
                ⚠️ Notifications are not supported in this browser. Try opening the app from your home screen after installing it as a PWA.
              </div>
            )}

            {notifPerm === "denied" && (
              <div style={{ padding:"12px 14px", borderRadius:8, background:T.overdueCardBg, border:`1px solid ${T.overdueBorder}`, fontSize:11, color:T.overdueText, marginBottom:16 }}>
                🚫 Notifications are blocked. To enable them, go to your browser or phone Settings → find AutoKeeper → allow notifications, then come back here.
              </div>
            )}

            {notifPerm === "default" && (
              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
                <div style={{ fontSize:12, color:T.text }}>Notifications are not yet enabled.</div>
                <button className="btn btn-primary" onClick={async () => {
                  const result = await requestNotifPermission();
                  if (result === "granted") checkAndNotify();
                }}>
                  ENABLE NOTIFICATIONS
                </button>
              </div>
            )}

            {notifPerm === "granted" && (
              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", borderRadius:8,
                  background:T.okCardBg, border:`1px solid ${T.okBorder}` }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:T.okText, flexShrink:0 }} />
                  <span style={{ fontSize:11, color:T.okText }}>Notifications are enabled</span>
                </div>
                <button className="btn btn-ghost" style={{ fontSize:11 }} onClick={() => { checkAndNotify(); setShowNotifPanel(false); }}>
                  🔍 CHECK NOW — send alerts for anything due
                </button>
              </div>
            )}

            {/* What triggers notifications */}
            <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:14, marginTop:4 }}>
              <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:10 }}>WHAT TRIGGERS A NOTIFICATION</div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {[
                  { color:T.overdueBorder, label:"Overdue", desc:"Any maintenance item past its interval" },
                  { color:T.dueSoonBorder, label:"Due soon", desc:"Within 1,000 mi or 60 days of interval" },
                ].map(row => (
                  <div key={row.label} style={{ display:"flex", alignItems:"center", gap:10, fontSize:11 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:row.color, flexShrink:0 }} />
                    <span style={{ color:T.text, width:72 }}>{row.label}</span>
                    <span style={{ color:T.textFaint }}>{row.desc}</span>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:10, color:T.textFaint, marginTop:12, lineHeight:1.6 }}>
                💡 For scheduled daily reminders, add AutoKeeper to your home screen as a PWA — then open it each morning and it will check automatically.
              </div>
            </div>

            <div style={{ marginTop:18 }}>
              <button className="btn btn-ghost" style={{ width:"100%" }} onClick={() => setShowNotifPanel(false)}>CLOSE</button>
            </div>
          </div>
        </div>
      )}

            {/* ══════════ COST ANALYSIS PANEL ══════════ */}
      {showCostPanel && (
        <div className="overlay" onClick={() => setShowCostPanel(false)}>
          <div className="modal" style={{ maxWidth:560 }} onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:22, letterSpacing:3, marginBottom:4, color:T.text }}>💰 IS THIS WORTH IT?</div>
            <div style={{ fontSize:11, color:T.textFaint, marginBottom:20, lineHeight:1.7 }}>
              A quick financial breakdown of what regular maintenance actually costs — and what skipping it could cost you.
            </div>

            {/* Annual cost estimate */}
            {(() => {
              const annualLow  = COST_DATA.maintenance.reduce((s,i) => s + i.low  * i.freqPerYear, 0);
              const annualHigh = COST_DATA.maintenance.reduce((s,i) => s + i.high * i.freqPerYear, 0);
              const perDayLow  = (annualLow  / 365).toFixed(2);
              const perDayHigh = (annualHigh / 365).toFixed(2);
              return (
                <div style={{ marginBottom:20 }}>
                  <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:10 }}>ESTIMATED ANNUAL MAINTENANCE COST</div>
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:10 }}>
                    <div style={{ flex:1, minWidth:120, padding:"14px 16px", borderRadius:10, background:T.okCardBg, border:`1px solid ${T.okBorder}`, textAlign:"center" }}>
                      <div style={{ fontFamily:"'Bebas Neue'", fontSize:28, color:T.okText }}>${Math.round(annualLow).toLocaleString()}–${Math.round(annualHigh).toLocaleString()}</div>
                      <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1 }}>PER YEAR</div>
                    </div>
                    <div style={{ flex:1, minWidth:120, padding:"14px 16px", borderRadius:10, background:T.surface2, border:`1px solid ${T.border}`, textAlign:"center" }}>
                      <div style={{ fontFamily:"'Bebas Neue'", fontSize:28, color:T.text }}>${perDayLow}–${perDayHigh}</div>
                      <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1 }}>PER DAY</div>
                    </div>
                  </div>
                  <div style={{ fontSize:10, color:T.textFaint, lineHeight:1.6 }}>
                    That's the cost of a cup of coffee — or less — per day to keep your car running well.
                  </div>
                </div>
              );
            })()}

            {/* Maintenance breakdown */}
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1, marginBottom:8 }}>WHAT YOU'RE SPENDING ON</div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {COST_DATA.maintenance.map((item,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 10px", borderRadius:6, background:i%2===0?T.surface:T.surface2, fontSize:11 }}>
                    <span style={{ color:T.text }}>{item.name}</span>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ color:T.okText }}>${item.low}–${item.high}</span>
                      <span style={{ color:T.textFaint, fontSize:9, marginLeft:6 }}>{item.note}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* What skipping costs */}
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:9, color:T.overdueText, letterSpacing:1, marginBottom:8 }}>WHAT SKIPPING MAINTENANCE CAN COST</div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {COST_DATA.repairs.map((r,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 10px", borderRadius:6, background:i%2===0?T.overdueCardBg:T.surface2, fontSize:11 }}>
                    <span style={{ color:T.text }}>{r.name}</span>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ color:T.overdueText }}>${r.low.toLocaleString()}–${r.high.toLocaleString()}</span>
                      <span style={{ color:T.textFaint, fontSize:9, marginLeft:6 }}>{r.note}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* vs. new car */}
            <div style={{ padding:"14px 16px", borderRadius:10, background:T.dueSoonCardBg, border:`1px solid ${T.dueSoonBorder}`, marginBottom:20 }}>
              <div style={{ fontSize:9, color:T.dueSoonText, letterSpacing:1, marginBottom:8 }}>VS. BUYING A NEW CAR</div>
              {(() => {
                const annualMaint = COST_DATA.maintenance.reduce((s,i) => s + (i.low+i.high)/2 * i.freqPerYear, 0);
                const yearsOfMaint = Math.round(COST_DATA.newCarCost.low / annualMaint);
                return (
                  <>
                    <div style={{ fontSize:12, color:T.text, lineHeight:1.7, marginBottom:8 }}>
                      The average new car costs <strong style={{ color:T.dueSoonText }}>${COST_DATA.newCarCost.low.toLocaleString()}–${COST_DATA.newCarCost.high.toLocaleString()}</strong> — roughly <strong style={{ color:T.dueSoonText }}>${COST_DATA.newCarCost.avgMonthly}/month</strong> in payments. Full maintenance on your current car costs a fraction of that.
                    </div>
                    <div style={{ fontSize:12, color:T.text, lineHeight:1.7 }}>
                      At average maintenance costs, you could keep your current car running for approximately <strong style={{ color:T.okText }}>{yearsOfMaint}+ years</strong> for what a single new car purchase costs. Every year you extend the life of your car instead of buying new saves you thousands.
                    </div>
                  </>
                );
              })()}
            </div>

            <div style={{ padding:"10px 14px", borderRadius:8, background:T.okCardBg, border:`1px solid ${T.okBorder}`, fontSize:11, color:T.okText, marginBottom:16, lineHeight:1.6 }}>
              ✓ Regular maintenance doesn't just prevent breakdowns — it's one of the highest-return financial decisions you can make as a car owner.
            </div>

            <button className="btn btn-ghost" style={{ width:"100%" }} onClick={() => setShowCostPanel(false)}>CLOSE</button>
          </div>
        </div>
      )}

      {/* ══════════ CARFAX IMPORT MODAL ══════════ */}
      {showCarfaxModal && vehicle && (
        <div className="overlay" onClick={() => { setShowCarfaxModal(false); setCarfaxResult(null); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:"'Bebas Neue'", fontSize:22, letterSpacing:3, marginBottom:4, color:T.text }}>📄 IMPORT CARFAX</div>
            <div style={{ fontSize:11, color:T.textFaint, marginBottom:16, lineHeight:1.7 }}>
              Upload a Carfax PDF report to automatically extract past service history into your log.
              This uses AI to read the report — results will vary based on PDF quality and format.
            </div>

            {!carfaxResult && !carfaxParsing && (
              <div>
                <div style={{ border:`2px dashed ${T.border2}`, borderRadius:10, padding:"28px 20px", textAlign:"center", cursor:"pointer", background:T.surface2, marginBottom:14 }}
                  onClick={() => document.getElementById('carfax-upload').click()}>
                  <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
                  <div style={{ fontSize:12, color:T.text, marginBottom:4 }}>Tap to select your Carfax PDF</div>
                  <div style={{ fontSize:10, color:T.textFaint }}>PDF files only · Your file is never uploaded to any server</div>
                  <input id="carfax-upload" type="file" accept=".pdf,application/pdf" style={{ display:"none" }}
                    onChange={async (e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      setCarfaxParsing(true);
                      setCarfaxResult(null);
                      try {
                        // Read file as base64
                        const base64 = await new Promise((res, rej) => {
                          const reader = new FileReader();
                          reader.onload = () => res(reader.result.split(',')[1]);
                          reader.onerror = rej;
                          reader.readAsDataURL(file);
                        });
                        // Call Claude API to parse the Carfax
                        const response = await fetch("https://api.anthropic.com/v1/messages", {
                          method: "POST",
                          headers: { "Content-Type": "application/json" },
                          body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1500,
                            messages: [{
                              role: "user",
                              content: [
                                { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
                                { type: "text", text: "Extract all service/maintenance records from this Carfax report. Return ONLY a JSON array, no other text. Each item: { date: 'YYYY-MM-DD', service: 'service name', miles: number_or_null, notes: 'any details' }. Use null for unknown miles. Focus on oil changes, fluid services, inspections, tire services, brake work. If you cannot find any records, return []." }
                              ]
                            }]
                          })
                        });
                        const data = await response.json();
                        const text = (data.content||[]).map(b => b.text||"").join("");
                        let records = [];
                        try {
                          const clean = text.replace(/```json|```/g,"").trim();
                          records = JSON.parse(clean);
                        } catch(pe) { records = []; }
                        setCarfaxResult(records);
                      } catch(err) {
                        setCarfaxResult("error");
                      }
                      setCarfaxParsing(false);
                    }} />
                </div>
                <div style={{ fontSize:10, color:T.textFaint, lineHeight:1.6, padding:"0 4px" }}>
                  🔒 Your PDF is read locally and processed via the Claude API. It is not stored anywhere.
                </div>
              </div>
            )}

            {carfaxParsing && (
              <div style={{ textAlign:"center", padding:"32px 20px" }}>
                <div style={{ fontSize:32, marginBottom:12 }}>⏳</div>
                <div style={{ fontSize:12, color:T.text }}>Reading your Carfax report...</div>
                <div style={{ fontSize:10, color:T.textFaint, marginTop:4 }}>This takes a few seconds</div>
              </div>
            )}

            {carfaxResult === "error" && (
              <div>
                <div style={{ padding:"12px 14px", borderRadius:8, background:T.overdueCardBg, border:`1px solid ${T.overdueBorder}`, fontSize:11, color:T.overdueText, marginBottom:14 }}>
                  Could not read the PDF. Make sure it's a real Carfax PDF (not a scanned image) and try again.
                </div>
